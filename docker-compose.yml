services:

  app1:
    image: nginx:alpine
    container_name: app1
    volumes:
      - ./app/app1:/usr/share/nginx/html
    networks:
      - rede-interna

  app2:
    image: nginx:alpine
    container_name: app2
    volumes:
      - ./app/app2:/usr/share/nginx/html
    networks:
      - rede-interna

  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: projeto
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rede-interna

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
    networks:
      - rede-interna

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    networks:
      - rede-interna

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - rede-interna

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command: --nginx.scrape-uri=http://nginx-lb/status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - rede-interna

volumes:
  postgres_data:
  grafana_data:

networks:
  rede-interna:
    driver: bridge
