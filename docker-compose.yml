services:

  app1:
    image: nginx:alpine
    container_name: app1
    networks:
      - rede-interna

  app2:
    image: nginx:alpine
    container_name: app2
    networks:
      - rede-interna

  db:
    image: postgres:16
    container_name: postgres-db
    environment:
      POSTGRES_DB: projeto
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rede-interna

  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2
    networks:
      - rede-interna

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - rede-interna

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - rede-interna

volumes:
  postgres_data:

networks:
  rede-interna:
    driver: bridge
