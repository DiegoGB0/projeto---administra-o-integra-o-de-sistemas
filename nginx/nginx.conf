events {}

http {

    upstream backend {
        server app1:80;
        server app2:80;
    }

    server {
        listen 80;

        # Encaminha todas as requisições para as duas instâncias da aplicação
        location / {
            proxy_pass http://backend;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Endpoint utilizado pelo Nginx Exporter para coletar métricas.
        # O módulo stub_status fornece informações como conexões ativas,
        # requisições processadas e estado do servidor, permitindo que o
        # Prometheus monitore o Nginx através do Exporter.
        location /status {
            stub_status;
            allow all;
        }
    }
}